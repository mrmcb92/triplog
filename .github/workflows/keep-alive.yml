name: Keep HF Space alive

on:
  schedule:
    # la fiecare 30 minute — cu mult sub limita de 48h de inactivitate a HF Spaces
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping TripLog pe Hugging Face Spaces
        run: |
          curl -fsS --max-time 20 https://mrmcb92-triplog.hf.space/health || exit 1
